<!DOCTYPE html>
<html>
<head>
    <title>Prelims Rakshak AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background: #f5f7fb;
            color: #1f2937;
        }

        h1 {
            text-align: center;
            color: #1d3557;
            margin-bottom: 8px;
            font-size: 32px;
        }

        .intro {
            text-align: center;
            font-size: 16px;
            margin-bottom: 24px;
            color: #4b5563;
            line-height: 1.6;
        }

        .box {
            background: white;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }

        .guide-text {
            margin-bottom: 6px;
            color: #374151;
        }

        textarea {
            width: 100%;
            height: 95px;
            padding: 12px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            box-sizing: border-box;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #1d3557;
            box-shadow: 0 0 0 3px rgba(29,53,87,0.12);
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #1d3557;
            color: white;
        }

        .secondary-button {
            background: #6c757d;
        }

        .copy-button {
            background: #2a9d8f;
        }

        #answer {
            margin-top: 22px;
            line-height: 1.75;
            font-size: 16px;
        }

        .section {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 14px;
            margin-top: 14px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .section summary {
            cursor: pointer;
            padding: 15px 16px;
            font-weight: 700;
            font-size: 17px;
            color: #1d3557;
            background: linear-gradient(to right, #eef4fb, #f8fbff);
            border-bottom: 1px solid #d9e2ec;
        }

        .section-content {
            padding: 16px;
            white-space: pre-wrap;
            background: #ffffff;
        }

        .section-content b {
            color: #1d3557;
        }

        .section-content .topic-heading {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: #1d3557;
            margin-bottom: 12px;
        }

        .section-content .sub-heading {
            display: block;
            font-size: 18px;
            font-weight: 700;
            color: #0b6e4f;
            margin-top: 18px;
            margin-bottom: 6px;
        }

        .section-content .trap-heading {
            display: block;
            font-size: 18px;
            font-weight: 800;
            color: #c1121f;
            margin-top: 18px;
            margin-bottom: 6px;
        }

        .section-content .takeaway-heading {
            display: block;
            font-size: 18px;
            font-weight: 800;
            color: #7c3aed;
            margin-top: 18px;
            margin-bottom: 6px;
        }

        .plain-answer {
            white-space: pre-wrap;
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 14px;
            padding: 16px;
            line-height: 1.7;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 28px;
            }

            .button-row {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<h1>Prelims Rakshak AI</h1>

<p class="intro">
Hello 👋 <b>Prelims Rakshak AI is Live.</b><br>
Ask any UPSC topic and instantly get PYQs, Quick Revision Notes, and Practice MCQs.
</p>

<div class="box">

<p class="guide-text"><b>Ask in this format:</b> topic, subject</p>
<p class="guide-text"><b>Example:</b> Indus Town Planning, Indian History</p>

<textarea id="question" placeholder="Example: Indus Town Planning, Indian History"></textarea>

<div class="button-row">
<button id="askButton" onclick="askAI()">Ask</button>
<button class="secondary-button" onclick="resetAI()">Reset</button>
<button class="copy-button" onclick="copyAnswer()">Copy</button>
</div>

<div id="answer">Your answer will appear here.</div>

</div>

<script>
function escapeHtml(text) {
    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function formatPyqText(text){
    let safe = escapeHtml(text);
    safe = safe.replace(/(20\d{2}\s*-\s*UPSC Prelims)/g, "<b>$1</b>");
    return safe;
}

function formatNotesText(text) {
    let safe = escapeHtml(text);

    const headingPatterns = [
        "Introduction",
        "Core Concepts",
        "Urban Layout",
        "Administrative Structure",
        "Political Structure",
        "Economic Features",
        "Important Sites",
        "Important Facts",
        "Geographic References",
        "Chronology",
        "Key Facts Table",
        "Exam Focus",
        "Quick Revision Flow"
    ];

    headingPatterns.forEach((heading) => {
        const regex = new RegExp(`(^|\\n)${heading}(?=\\n|:)`, "g");
        safe = safe.replace(regex, `$1<span class="sub-heading">${heading}</span>`);
    });

    safe = safe.replace(/(^|\n)(UPSC Trap Zone ?⚠?)(?=\n|:)/g, `$1<span class="trap-heading">$2</span>`);
    safe = safe.replace(/(^|\n)(Revision Takeaway|One-Line Revision Takeaway)(?=\n|:)/g, `$1<span class="takeaway-heading">$2</span>`);

    const lines = safe.split("\n").filter(line => line.trim() !== "");
    if (lines.length > 0) {
        lines[0] = `<span class="topic-heading">${lines[0]}</span>`;
    }

    return lines.join("\n");
}

function formatMcqText(text) {
    let safe = escapeHtml(text);

    safe = safe.replace(/(^|\n)(Correct Answer)(?=\n|:)/g, `$1<b>$2</b>`);
    safe = safe.replace(/(^|\n)(Elimination Logic)(?=\n|:)/g, `$1<b>$2</b>`);
    safe = safe.replace(/(^|\n)(Why other options are wrong)(?=\n|:)/gi, `$1<b>Why other options are wrong</b>`);
    safe = safe.replace(/(^|\n)(Trap Zone)(?=\n|:)/g, `$1<b style="color:#c1121f;">$2</b>`);
    safe = safe.replace(/(^|\n)(Question\s*\d+.*)/gi, `$1<b>$2</b>`);

    return safe;
}

function buildSections(answer){
    const pyqHeading = "A. UPSC PRELIMS PYQs";
    const notesHeading = "B. QUICK REVISION NOTES";
    const mcqHeading = "C. PRACTICE MCQs";

    const aIndex = answer.indexOf(pyqHeading);
    const bIndex = answer.indexOf(notesHeading);
    const cIndex = answer.indexOf(mcqHeading);

    if(aIndex === -1 || bIndex === -1 || cIndex === -1){
        return `<div class="plain-answer">${escapeHtml(answer)}</div>`;
    }

    const pyqText = answer.substring(aIndex + pyqHeading.length, bIndex).trim();
    const notesText = answer.substring(bIndex + notesHeading.length, cIndex).trim();
    const mcqText = answer.substring(cIndex + mcqHeading.length).trim();

    return `
<details class="section" open>
<summary>▼ PYQs</summary>
<div class="section-content">${formatPyqText(pyqText)}</div>
</details>

<details class="section" open>
<summary>▼ Quick Revision Notes</summary>
<div class="section-content">${formatNotesText(notesText)}</div>
</details>

<details class="section">
<summary>▼ Practice MCQs</summary>
<div class="section-content">${formatMcqText(mcqText)}</div>
</details>
`;
}

function resetAI(){
    document.getElementById("question").value = "";
    document.getElementById("answer").innerText = "Your answer will appear here.";
}

function copyAnswer(){
    const text = document.getElementById("answer").innerText;
    navigator.clipboard.writeText(text);
}

async function askAI(){
    const question = document.getElementById("question").value;
    const answerBox = document.getElementById("answer");
    const askButton = document.getElementById("askButton");

    answerBox.innerText = "Loading...";
    askButton.disabled = true;
    askButton.innerText = "Please wait...";

    try {
        const response = await fetch("https://prelims-rakshak-ai-production.up.railway.app/ask", {
            method: "POST",
            headers: { "Content-Type":"application/json" },
            body: JSON.stringify({ message: question })
        });

        const data = await response.json();
        answerBox.innerHTML = buildSections(data.answer || "No answer received.");
    } catch(error) {
        answerBox.innerHTML = `<div class="plain-answer">Error: ${escapeHtml(error.toString())}</div>`;
    }

    askButton.disabled = false;
    askButton.innerText = "Ask";
}
</script>

</body>
</html>
