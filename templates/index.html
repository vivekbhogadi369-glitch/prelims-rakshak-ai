<!DOCTYPE html>
<html>
<head>
    <title>Prelims Rakshak AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;

        }

        button {

            border-radius: 10px;

        }

        }

            background: #2a9d8f;
        }
        #answer {
            margin-top: 20px;
            line-height: 1.7;

        }
        .section {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 10px;
            margin-top: 12px;
            overflow: hidden;
        }
        .section summary {
            cursor: pointer;
            padding: 14px;
            font-weight: bold;
            color: #1d3557;
            background: #eef4fb;
        }
        .section-content {
            padding: 14px;
            white-space: pre-wrap;
        }
        .plain-answer {
            white-space: pre-wrap;
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 10px;
            padding: 14px;
        }

        /* Notes styling (unchanged) */
        .topic {
            display: block;
            font-size: 22px;
            font-weight: 900;
            color: #1d3557;
            margin-bottom: 12px;
        }
        .heading {
            display: block;

        }
        .trap {
            display: block;
            font-weight: 900;
            font-size: 18px;
            color: #c1121f;
            margin-top: 18px;
            margin-bottom: 8px;
            text-decoration: underline;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .takeaway {

        /* MCQ headings (unchanged) */
        .mcq-heading-question {

            text-transform: uppercase;
        }
        .mcq-heading-options {

            font-size: 18px;

            display: block;

            color: #0b6e4f;

        .mcq-heading-wrong {
            display: block;
            font-weight: 900;
            font-size: 18px;
            color: #9c6644;

        /* ✅ NEW MCQ CARD */
        .mcq-card {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

<body>

<h1>Prelims Rakshak AI</h1>

<p class="intro">
Hello 👋 <b>Prelims Rakshak AI is Live.</b><br>
Ask any UPSC topic and instantly get PYQs, Quick Revision Notes, and Practice MCQs.
</p>

<div class="box">
<textarea id="question" placeholder="Example: Indus Town Planning, Indian History"></textarea>

<div class="button-row">
<button id="askButton" onclick="askAI()">Ask</button>
<button class="secondary-button" onclick="resetAI()">Reset</button>
<button class="copy-button" onclick="copyAnswer()">Copy</button>
</div>

<div id="answer">Your answer will appear here.</div>
</div>

<script>

function formatMcqText(text) {

    const rawLines = text.replace(/\r/g, "").split("\n");
    const out = [];

    for (let i = 0; i < rawLines.length; i++) {

        let line = rawLines[i].replace(/\*\*/g, "").trim();

        if (!line) {
            out.push("");
            continue;
        }

        if (/^(\d+\.\s*)?(Q:|Question:)/i.test(line)) {
            out.push(`<span class="mcq-heading-question">QUESTION</span>`);
            line = line.replace(/^(\d+\.\s*)?(Q:|Question:)/i, "").trim();
            if (line) out.push(line);
            continue;
        }

        if (/^Options:/i.test(line)) {
            out.push(`<span class="mcq-heading-options">OPTIONS</span>`);
            continue;
        }

        if (/^\(?[A-Da-d]\)?[\.\)]\s*/.test(line)) {
            out.push(`<b>${line}</b>`);
            continue;
        }

        if (/^(Correct Answer:|Answer:)/i.test(line)) {
            out.push(`<span class="mcq-heading-answer">CORRECT ANSWER</span>`);
            out.push(line.replace(/^(Correct Answer:|Answer:)/i, "").trim());
            continue;
        }

        if (/^Elimination Logic:/i.test(line)) {
            out.push(`<span class="mcq-heading-logic">ELIMINATION LOGIC</span>`);
            out.push(line.replace(/^Elimination Logic:/i, "").trim());
            continue;
        }

        if (/^(Why others are wrong|Why other options are wrong):/i.test(line)) {
            out.push(`<span class="mcq-heading-wrong">WHY OTHER OPTIONS ARE WRONG</span>`);
            out.push(line.replace(/^(Why others are wrong|Why other options are wrong):/i, "").trim());
            continue;
        }

        if (/^Trap Zone:/i.test(line)) {
            out.push(`<span class="mcq-heading-trap">TRAP ZONE</span>`);
            out.push(line.replace(/^Trap Zone:/i, "").trim());
            continue;
        }

        out.push(line);
    }

    return `<div class="mcq-card">${out.join("\n")}</div>`;
}

</script>

</body>
</html>
